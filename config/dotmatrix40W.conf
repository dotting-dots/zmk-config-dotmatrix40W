# ============================================================
# dotmatrix40W - User Configuration
# ============================================================

# ① Deep Sleep
# Sequence: last keypress → 5 min idle (backlight off) → 10 min more → deep sleep (15 min total)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# ③ Backlight Auto-Off
# AUTO_OFF_USB: keep backlight on while USB is connected; turn off when USB disconnects
# Note: backlight turns off immediately upon USB disconnect (not idle-based)
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y

# ④ Bluetooth TX Power (-4 dBm)
CONFIG_BT_CTLR_TX_PWR_MINUS_4=y
